description = """
Full polecat work lifecycle for the monorepo rig, with CI validation and AI review handling.

Extends the standard polecat work formula with monorepo-specific post-implementation
steps: GitHub CI validation and automated review comment handling (Cursor Bugbot,
CodeRabbit, Greptile, Delve).

This molecule guides a polecat through a complete work assignment. Each step
has clear entry/exit criteria and specific commands to run. A polecat can
crash after any step and resume from the last completed step.

## Polecat Contract (Self-Cleaning Model)

You are a self-cleaning worker. You:
1. Receive work via your hook (formula checklist + issue)
2. Work through formula steps in order (shown inline at prime time)
3. Complete and self-clean via `gt done` (submit + nuke yourself)
4. You are GONE - Refinery merges from MQ

**Self-cleaning:** When you run `gt done`, you push your work, submit to MQ,
nuke your sandbox, and exit. There is no idle state. Done means gone.

**Important:** This formula defines the workflow template. Steps are shown inline
when you run `gt prime` — there are no separate step beads to close. Work through
the checklist, then run `gt done`.

**Speed principle:** You run the full gate suite AFTER rebasing onto the target
branch (pre-verify step). This enables the refinery to fast-path merge your MR
in ~5 seconds instead of re-running gates. If pre-verification is skipped or
stale, the refinery falls through to normal gate execution.

**Monorepo extras:** After implementation, you push a PR, wait for GitHub Actions
CI to pass (fixing any failures), then enter a fix-pr loop: wait for all automated
reviewers (Cursor Bugbot, CodeRabbit, Greptile, Delve) to finish, run /fix-pr to
address all comments, and repeat until no new actionable comments remain.

**You do NOT:**
- Push directly to main (Refinery merges from MQ)
- Close your own issue (Refinery closes after merge)
- Wait for merge (you're gone after `gt done`)
- Fix pre-existing failures on main (Refinery owns main health)

## Variables

| Variable | Source | Description |
|----------|--------|-------------|
| issue | hook_bead | The issue ID you're assigned to work on |
| base_branch | sling vars | The base branch to rebase on (default: main) |
| setup_command | rig config | Setup/install command (e.g., `pnpm install`). Empty = skip. |
| typecheck_command | rig config | Type check command (e.g., `tsc --noEmit`). Empty = skip. |
| test_command | rig config | Test command. Empty = skip. Rig must configure for its language. |
| lint_command | rig config | Lint command (e.g., `eslint .`). Empty = skip. |
| build_command | rig config | Build command (e.g., `go build ./...`). Empty = skip. |

## Failure Modes

| Situation | Action |
|-----------|--------|
| Build fails | Fix it. Do not proceed if it won't compile. |
| CI fails | Diagnose and fix. Re-push until green. |
| AI reviewer comment | Wait for reviewer to finish, run /fix-pr, loop until clean. |
| Blocked on external | Mail Witness for help, mark yourself stuck |
| Context filling | Use gt handoff to cycle to fresh session |
| Unsure what to do | Mail Witness, don't guess |"""
formula = "mol-polecat-work-monorepo"
version = 1

[[steps]]
id = "load-context"
title = "Load context and verify assignment"
description = """
Initialize your session and understand your assignment.

**1. Prime your environment:**
```bash
gt prime                    # Load role context
bd prime                    # Load beads context
```

**2. Check your hook:**
```bash
gt hook               # Shows your pinned molecule and hook_bead
```

The hook_bead is your assigned issue. Read it carefully:
```bash
bd show {{issue}}           # Full issue details
```

**3. Check inbox for additional context:**
```bash
gt mail inbox
# Read any HANDOFF or assignment messages
```

**4. Understand the requirements:**
- What exactly needs to be done?
- What files are likely involved?
- Are there dependencies or blockers?
- What does "done" look like?

**5. Verify you can proceed:**
- No unresolved blockers on the issue
- You understand what to do
- Required resources are available

If blocked or unclear, mail Witness immediately:
```bash
gt mail send <rig>/witness -s "HELP: Unclear requirements" -m "Issue: {{issue}}
Question: <what you need clarified>"
```

**Exit criteria:** You understand the work and can begin implementation."""

[[steps]]
id = "branch-setup"
title = "Set up working branch"
needs = ["load-context"]
description = """
Ensure you're on a clean feature branch ready for work.

**1. Check current branch state:**
```bash
git status
git branch --show-current
```

**2. If not on a feature branch, create one:**
```bash
git fetch origin
git checkout -b polecat/<name> origin/{{base_branch}}
```

**3. Ensure clean working state:**
```bash
git status                  # Should show "working tree clean"
git stash list              # Should be empty
```

If dirty state from previous work:
```bash
# If changes are relevant to this issue:
git add -A && git commit -m "WIP: <description>"

# If changes are unrelated cruft:
git stash push -m "unrelated changes before {{issue}}"
# Or discard if truly garbage:
git checkout -- .
```

**4. Sync with {{base_branch}}:**
```bash
git fetch origin
git rebase origin/{{base_branch}}      # Get latest, rebase your branch
```

If rebase conflicts:
- Resolve them carefully
- If stuck, mail Witness

**5. Run project setup (if configured):**

If setup_command is set, run it to install dependencies:
```bash
{{setup_command}}
```

This ensures dependencies are installed before you start work.
Empty setup_command means "not configured" — skip this step.

**Exit criteria:** You're on a clean feature branch, rebased on latest {{base_branch}}, dependencies installed."""

[[steps]]
id = "implement"
title = "Implement the solution"
needs = ["branch-setup"]
description = """
Do the actual implementation work.

**Working principles:**
- Follow existing codebase conventions
- Make atomic, focused commits
- Keep changes scoped to the assigned issue
- Don't gold-plate or scope-creep

**Persist findings as you go (CRITICAL for session survival):**
Your session can die at any time (context limit, crash, SIGKILL). Code changes
survive in git, but analysis, findings, and decisions exist only in your context
window. Persist them to the bead so they survive session death:
```bash
# After completing significant analysis or reaching conclusions:
bd update {{issue}} --notes "Findings so far: <what you discovered>"
# For detailed reports, use --design:
bd update {{issue}} --design "<structured findings>"
```
Do this BEFORE closing molecule steps, not after. If your session dies between
persisting and closing, the findings survive. If you close first, they're lost.

**For report-only tasks** (audits, reviews, research): your findings ARE the
deliverable. There are no code changes to commit. You MUST persist all findings
to the bead via --notes or --design. Without this, your entire work product is
lost when the session ends.

**Commit frequently (for code tasks):**
```bash
# After each logical unit of work:
git add <files>
git commit -m "<type>: <description> ({{issue}})"
```

Commit types: feat, fix, refactor, test, docs, chore

**Discovered work:**
If you find bugs or improvements outside your scope:
```bash
bd create --title "Found: <description>" --type bug --priority 2
# Note the ID, continue with your work
```

Do NOT fix unrelated issues in this branch.

**If stuck:**
Don't spin for more than 15 minutes. Mail Witness:
```bash
gt mail send <rig>/witness -s "HELP: Stuck on implementation" -m "Issue: {{issue}}
Trying to: <what you're attempting>
Problem: <what's blocking you>
Tried: <what you've attempted>"
```

**Exit criteria:** Implementation complete. Code tasks: all changes committed. Report tasks: all findings persisted to bead."""

[[steps]]
id = "self-review"
title = "Self-review changes"
needs = ["implement"]
description = """
Review your own changes before the build check.

**1. Review the diff:**
```bash
git diff origin/{{base_branch}}...HEAD     # All changes vs {{base_branch}}
git log --oneline origin/{{base_branch}}..HEAD  # All commits
```

**2. Check for common issues:**

| Category | Look For |
|----------|----------|
| Bugs | Off-by-one, null handling, edge cases |
| Security | Injection, auth bypass, exposed secrets |
| Style | Naming, formatting, code organization |
| Completeness | Missing error handling, incomplete paths |
| Cruft | Debug prints, commented code, TODOs |

**3. Fix issues found:**
Don't just note them - fix them now. Amend or add commits as needed.

**4. Verify no unintended changes:**
```bash
git diff --stat origin/{{base_branch}}...HEAD
# Only files relevant to {{issue}} should appear
```

If you accidentally modified unrelated files, remove those changes.

**Exit criteria:** Changes are clean, reviewed, and ready for build check."""

[[steps]]
id = "build-check"
title = "Build and sanity check"
needs = ["self-review"]
description = """
Verify your changes compile and pass basic sanity checks. The Refinery's
bisecting merge queue runs the full test suite — your job is to catch
obvious problems fast so you don't waste the MQ's time.

**1. Build (REQUIRED — must pass):**

If build_command is set:
```bash
{{build_command}}
```

If setup_command is set (ensure new deps are installed):
```bash
{{setup_command}}
```

If typecheck_command is set:
```bash
{{typecheck_command}}
```

Empty commands mean "not configured" — skip silently.

**2. If build fails:**
- Fix it. Return to implement step if needed.
- Do NOT submit broken code to the merge queue.

**3. Targeted tests (OPTIONAL — run if fast and relevant):**

If you modified or added test files, run those specific tests to catch
obvious regressions. Do NOT run the full test suite — that's the
Refinery's job.

```bash
# Example: run only tests in packages you changed
go test ./internal/pkg/you/changed/...
# Or for JS: npx jest --testPathPattern="changed-file"
```

If you're unsure which tests are relevant, skip this — the MQ will catch it.

**4. Lint (OPTIONAL — run if configured and fast):**

If lint_command is set:
```bash
{{lint_command}}
```

**Exit criteria:** Code compiles. Obvious regressions caught. Ready to submit."""

[[steps]]
id = "commit-changes"
title = "Commit all implementation changes"
needs = ["build-check"]
description = """
Ensure ALL implementation work is committed before cleanup.

**CRITICAL: You MUST commit all changes from implementation.**
NEVER use `git checkout -- .` or `git restore .` to discard implementation work.
ALWAYS commit ALL uncommitted changes from your implementation.

**1. Check for uncommitted changes:**
```bash
git status
```

**2. If there are ANY uncommitted changes, commit them now:**
```bash
git add -A && git commit -m "<type>: <descriptive message> ({{issue}})"
```

**3. If working tree is already clean, that's fine — but you MUST still have commits (step 4).**

**4. VERIFY commits exist (HARD GATE — do NOT close this step without passing):**
```bash
git log origin/{{base_branch}}..HEAD --oneline
```

This MUST show at least 1 commit. If it shows NOTHING:
- You have NOT completed your implementation. Do NOT close this step.
- Go back to the implement step and do the work.
- If the task genuinely requires no code changes (already fixed upstream, etc.),
  run `gt done --status DEFERRED` and skip remaining steps.
- Do NOT proceed to cleanup or submit with zero commits.

**5. VERIFY clean working tree:**
```bash
git status
```
Must show "nothing to commit, working tree clean".

**Report-only tasks (audits, reviews, research — no code changes):**
If your task produced no code changes, verify your findings are persisted to the bead:
```bash
bd show {{issue}}    # Check notes/design fields have your findings
```
If findings are persisted, proceed to cleanup. `gt done --cleanup-status clean`
handles the no-commit case for report-only tasks.

**Exit criteria:** Working tree clean AND either (a) at least 1 commit ahead of origin/{{base_branch}}, or (b) report-only task with findings persisted to bead."""

[[steps]]
id = "push-and-create-pr"
title = "Push branch and create/update PR"
needs = ["commit-changes"]
description = """
Push your branch and ensure a PR exists for CI and AI review.

**1. Push your branch:**
```bash
git push origin HEAD -u
```

**2. Check if a PR already exists:**
```bash
gh pr view --json number,url 2>/dev/null
```

**3. If no PR exists, create one using /ship format:**

First, understand the full branch to write a good PR description:
```bash
BASE={{base_branch}}
git log --oneline origin/$BASE..HEAD
git diff --stat origin/$BASE...HEAD
bd show {{issue}}    # Get issue context for motivation section
```

Then create the PR with a type label and structured body:
```bash
gh pr create --title "<type>: <description> ({{issue}})" \
  --label "type: <feature|fix|refactor|chore|docs|test|dx|security>" \
  --body "$(cat <<'EOF'
## Context & Motivation
Why this change is needed. Reference the issue and what triggered the work.

## Summary
- <bullet points describing what changed>
- <group by concern: schema, API, logic, config, tests>

## Beads
- Closes: {{issue}}

## Impact Analysis
**What stays the same**: <existing behavior preserved>
**What changes**: <specific behavior differences>
**Edge cases**: <scenarios requiring special handling>

## Backward Compatibility
<Why this change is safe to deploy — nullable columns, old callers still work, etc.>
<Omit this section for non-breaking changes>

## Verification
How to confirm the changes work:
1. <step-by-step instructions>
2. <expected outcomes>

**Review focus areas**:
- <specific files or concepts deserving scrutiny>

## Test plan
- [ ] <automated tests covering the changes — name test files>
- [ ] CI passes
- [ ] AI review comments addressed

🤖 Generated with [Claude Code](https://claude.com/claude-code)
EOF
)" --repo $(git remote get-url origin | sed 's|.*github.com[:/]||;s|\\.git$||')
```

**Omit sections that don't apply.** Specifically:
- **Impact Analysis**: omit for trivial changes (typos, formatting, dependency bumps)
- **Backward Compatibility**: omit if no schema, API, or behavioral changes
- **Verification**: omit for pure test or docs changes

Choose the single most accurate `type:` label:

| Label | When |
|-------|------|
| `type: feature` | New capability |
| `type: fix` | Bug fix |
| `type: refactor` | Code restructuring, no behavior change |
| `type: chore` | Maintenance, deps, housekeeping |
| `type: docs` | Documentation only |
| `type: test` | Test additions only |
| `type: dx` | Dev tooling, CI improvements |
| `type: security` | Security fix or hardening |

**4. If PR already exists, force-push is fine:**
The PR will update automatically when you push.

**Exit criteria:** Branch pushed, PR exists on GitHub."""

[[steps]]
id = "validate-ci"
title = "Validate CI passes"
needs = ["push-and-create-pr"]
description = """
Wait for GitHub Actions CI to complete and fix any failures.

**1. Run the validate-ci skill:**
```
/validate-ci
```

This will:
- Wait for all CI checks to complete
- Diagnose any failures
- If failures are in your code: fix them, commit, push, and re-check
- If failures are pre-existing on main: note them and proceed

**2. If CI fails due to your changes:**
- Read the failure logs
- Fix the issue
- Commit and push
- Re-run /validate-ci
- Repeat until green

**3. If CI fails due to pre-existing issues on main:**
- Note this in your PR description
- Proceed — Refinery owns main health, not you

**Exit criteria:** All CI checks pass (or only pre-existing failures remain)."""

[[steps]]
id = "handle-ai-reviews"
title = "Address automated review comments (fix-pr loop)"
needs = ["validate-ci"]
description = """
Wait for all automated reviewers to finish, then run /fix-pr in a loop until
the PR is clean. Automated reviewers (Cursor Bugbot, CodeRabbit, Greptile,
Delve) comment after each push, so every fix-pr push may trigger new comments.

**The loop:**

```
ITERATION=0
while true:
  1. Wait for reviewers to finish
  2. Run /fix-pr
  3. If /fix-pr pushed new commits → back to 1
  4. If no changes needed → done
```

**Step 1: Wait for automated reviewers to complete.**

Gate on GitHub check-run status, not comment count. This handles timing
variations (Bugbot: ~7 min, CodeRabbit: ~5 min, Delve: ~2 min).

```bash
PR_NUMBER=$(gh pr view --json number -q '.number')
REPO=$(gh repo view --json nameWithOwner -q '.nameWithOwner')

# Poll until all bot check-runs are complete (max 15 minutes)
for i in $(seq 1 15); do
  PENDING=$(gh pr checks $PR_NUMBER --json name,status \
    --jq '[.[] | select(
      (.name | test("Bugbot|CodeRabbit|Greptile|Delve"; "i")) and
      (.status != "COMPLETED")
    )] | length')

  if [ "$PENDING" = "0" ]; then
    echo "All automated reviewers complete."
    break
  fi

  echo "Waiting for $PENDING reviewer check(s)... (attempt $i/15)"
  sleep 60
done
```

If checks haven't completed after 15 minutes, proceed anyway — some reviewers
may not have triggered for this PR.

**Step 2: Run /fix-pr to address all current comments.**

```
/fix-pr
```

This will:
- Fetch ALL review comments (Bugbot, CodeRabbit, Greptile, Delve, humans)
- Classify comments by root-cause error class
- Sweep the entire changeset for unreported instances of the same class
- Fix valid issues, reply to every comment
- Push fixes and verify unresolved thread count is zero

**Step 3: Check if /fix-pr pushed new commits.**

```bash
# Record HEAD before fix-pr
HEAD_BEFORE=<sha recorded before running /fix-pr>

# After fix-pr completes:
HEAD_AFTER=$(git rev-parse HEAD)

if [ "$HEAD_BEFORE" != "$HEAD_AFTER" ]; then
  echo "fix-pr pushed new commits — looping back to wait for reviewers."
  ITERATION=$((ITERATION + 1))
  # Safety valve: max 3 iterations to prevent infinite loops
  if [ "$ITERATION" -ge 5 ]; then
    echo "WARNING: 5 fix-pr iterations reached. Proceeding to submit."
    echo "Remaining comments may need human review."
    # break out of loop
  fi
  # Go back to Step 1
else
  echo "fix-pr made no changes — PR is clean."
  # break out of loop
fi
```

**Safety valve:** Maximum 5 iterations. If the loop hasn't converged after
5 rounds of fix-pr, proceed to submit — remaining comments likely need human
judgment. Note any unresolved items in the PR description.

**Exit criteria:** All automated review comments addressed and replied to
(or max iterations reached with remaining items noted). CI still green."""

[[steps]]
id = "submit-and-exit"
title = "Submit work and self-clean"
needs = ["handle-ai-reviews"]
description = """
Submit your work and clean up. Your behavior depends on your base branch.

**Pre-flight: Verify you have actual work to submit (HARD GATE):**
```bash
git log origin/{{base_branch}}..HEAD --oneline
```
This MUST show at least 1 commit. If it shows nothing, do NOT run `gt done`.

## Mode A: PR against main (base_branch = main)

Your PR is the deliverable. A human teammate will review and merge it.
CI is green, AI reviews are addressed — the PR is ready for human review.

```bash
# Ensure latest changes are pushed
git push origin HEAD

# Exit cleanly — the PR is the deliverable
gt done
```

**Important:** When this bead was slung with `--no-merge` (set at dispatch time),
`gt done` automatically detects the `no_merge` flag on the bead and skips the
merge queue. It creates a GitHub PR for human review instead. You do NOT need
to pass `--no-merge` to `gt done` — the flag is on the bead, not the command.

If the bead was NOT slung with `--no-merge`, `gt done` submits to the merge
queue as normal. The merge strategy is a dispatch-time decision, not yours.

**What happens next (not your concern):**
- A human reviews and approves the PR (branch protection requires 1 approval)
- The PR is merged via GitHub (not direct push)
- You are done. The PR speaks for itself.

## Mode B: Swarm into feature branch (base_branch != main)

You are part of a swarm merging into a shared feature branch. The refinery
manages the merge queue on that feature branch.

**1. Rebase onto latest feature branch:**
```bash
git fetch origin {{base_branch}}
git rebase origin/{{base_branch}}
```

If rebase conflicts: resolve carefully. If stuck, mail Witness.

**2. Run the full gate suite on the rebased result (pre-verify):**

If build_command is set: run {{build_command}}
If typecheck_command is set: run {{typecheck_command}}
If lint_command is set: run {{lint_command}}
If test_command is set: run {{test_command}}

Skip any empty/unconfigured commands silently.

**3. If all gates pass, submit to merge queue:**
```bash
gt done --pre-verified --target {{base_branch}}
```

**4. If gates fail:** fix, commit, re-rebase, re-run gates. Do NOT submit broken code.

**What happens next (not your concern):**
- Refinery merges your work into {{base_branch}} (the feature branch)
- Once all swarm work lands, a human opens a PR from the feature branch to main

## How to decide which mode

Check your base_branch variable:
- If `{{base_branch}}` is `main` (or `master`) → **Mode A** (PR-only, `--no-merge`)
- If `{{base_branch}}` is anything else → **Mode B** (merge queue, `--pre-verified`)

You are GONE after `gt done`. Done means gone.

**Exit criteria:** Work submitted (or PR left for review), sandbox nuked, session exited."""

[vars]
[vars.issue]
description = "The issue ID assigned to this polecat"
required = true

[vars.base_branch]
description = "The base branch to rebase on and compare against (e.g., main, integration/epic-id)"
default = "main"

[vars.setup_command]
description = "Setup/install command (e.g., pnpm install). Empty = skip."
default = ""

[vars.typecheck_command]
description = "Type check command (e.g., tsc --noEmit). Empty = skip."
default = ""

[vars.test_command]
description = "Command to run tests (auto-detected from rig settings)"
default = ""

[vars.lint_command]
description = "Command to run linting. Empty = skip."
default = ""

[vars.build_command]
description = "Command to run build. Empty = skip."
default = ""
