name: Release

on:
  push:
    tags:
      - 'v*'
  # Manual dispatch is only for rerunning a release from a v* tag. Publishing
  # jobs below are tag-gated and skip branch refs.
  workflow_dispatch:

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions: {}

jobs:
  goreleaser:
    if: ${{ github.repository == 'gastownhall/gastown' && startsWith(github.ref, 'refs/tags/v') }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version: '1.26'

      - name: Install cross-compilation toolchains
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-mingw-w64-x86-64 gcc-aarch64-linux-gnu

      - name: Reject replace directives in go.mod
        run: |
          if grep -qE '^replace\s' go.mod; then
            echo "ERROR: go.mod contains replace directives — aborting release."
            echo "Replace directives break 'go install ...@latest'."
            echo "See: https://github.com/gastownhall/gastown/issues/2230"
            grep -n '^replace' go.mod
            exit 1
          fi

      - name: Verify tag matches Version constant
        run: make check-version-tag

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@1a80836c5c9d9e5755a25cb59ec6f45a3b5f41a8 # v7
        with:
          distribution: goreleaser
          version: '~> v2'
          args: >
            release --clean
            ${{ github.repository != 'gastownhall/gastown' && '--skip=publish --skip=announce' || '' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  attest-release:
    if: ${{ github.repository == 'gastownhall/gastown' && startsWith(github.ref, 'refs/tags/v') }}
    needs: goreleaser
    runs-on: ubuntu-latest
    permissions:
      attestations: write
      contents: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Resolve release asset paths
        id: assets
        run: |
          version="${GITHUB_REF_NAME#v}"
          mkdir -p dist
          echo "checksums=dist/gastown_${version}_checksums.txt" >> "$GITHUB_OUTPUT"
          echo "sbom=dist/gastown-${GITHUB_REF_NAME}.spdx.json" >> "$GITHUB_OUTPUT"

      - name: Download release checksums
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          version="${GITHUB_REF_NAME#v}"
          gh release download "${GITHUB_REF_NAME}" --pattern "gastown_${version}_checksums.txt" --dir dist

      - name: Generate release SBOM
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0
        with:
          path: .
          format: spdx-json
          output-file: ${{ steps.assets.outputs.sbom }}
          upload-artifact: false
          upload-release-assets: false

      - name: Upload release SBOM
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "${GITHUB_REF_NAME}" "${{ steps.assets.outputs.sbom }}" --clobber

      - name: Attest release artifacts
        uses: actions/attest@59d89421af93a897026c735860bf21b6eb4f7b26 # v4
        with:
          subject-checksums: ${{ steps.assets.outputs.checksums }}

      - name: Attest release SBOM
        uses: actions/attest@59d89421af93a897026c735860bf21b6eb4f7b26 # v4
        with:
          subject-checksums: ${{ steps.assets.outputs.checksums }}
          sbom-path: ${{ steps.assets.outputs.sbom }}

  update-homebrew-formula:
    runs-on: ubuntu-latest
    needs: [goreleaser, attest-release]
    if: ${{ github.repository == 'gastownhall/gastown' && startsWith(github.ref, 'refs/tags/v') }}
    permissions:
      contents: read
    env:
      HAS_HOMEBREW_APP: ${{ secrets.HOMEBREW_TAP_APP_ID != '' && secrets.HOMEBREW_TAP_APP_PRIVATE_KEY != '' }}
      HAS_HOMEBREW_PAT: ${{ secrets.HOMEBREW_TAP_TOKEN != '' }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Mint Homebrew tap token
        id: homebrew-token
        if: ${{ env.HAS_HOMEBREW_APP == 'true' }}
        uses: actions/create-github-app-token@1b10c78c7865c340bc4f6099eb2f838309f1e8c3 # v3
        with:
          app-id: ${{ secrets.HOMEBREW_TAP_APP_ID }}
          private-key: ${{ secrets.HOMEBREW_TAP_APP_PRIVATE_KEY }}
          owner: gastownhall
          repositories: homebrew-gastown
          permission-contents: write

      - name: Generate and push Homebrew formula
        if: ${{ env.HAS_HOMEBREW_APP == 'true' || env.HAS_HOMEBREW_PAT == 'true' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HOMEBREW_TAP_TOKEN: ${{ steps.homebrew-token.outputs.token || secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          version="${{ steps.version.outputs.version }}"
          tag="v${version}"
          base_url="https://github.com/gastownhall/gastown/releases/download/${tag}"

          gh release download "${tag}" --pattern "gastown_${version}_checksums.txt" --dir /tmp
          checksums_file="/tmp/gastown_${version}_checksums.txt"

          get_sha256() {
            local sha
            sha=$(grep "$1" "$checksums_file" | awk '{print $1}')
            if [ -z "$sha" ]; then
              echo "ERROR: missing checksum for $1" >&2
              exit 1
            fi
            echo "$sha"
          }

          darwin_arm64_sha=$(get_sha256 "gastown_${version}_darwin_arm64.tar.gz")
          darwin_amd64_sha=$(get_sha256 "gastown_${version}_darwin_amd64.tar.gz")
          linux_amd64_sha=$(get_sha256 "gastown_${version}_linux_amd64.tar.gz")
          linux_arm64_sha=$(get_sha256 "gastown_${version}_linux_arm64.tar.gz")

          cat > /tmp/gastown.rb <<FORMULA
          # typed: false
          # frozen_string_literal: true

          class Gastown < Formula
            desc "Multi-agent workspace manager"
            homepage "https://github.com/gastownhall/gastown"
            version "${version}"
            license "MIT"

            on_macos do
              if Hardware::CPU.arm?
                url "${base_url}/gastown_${version}_darwin_arm64.tar.gz"
                sha256 "${darwin_arm64_sha}"
              else
                url "${base_url}/gastown_${version}_darwin_amd64.tar.gz"
                sha256 "${darwin_amd64_sha}"
              end
            end

            on_linux do
              if Hardware::CPU.arm?
                url "${base_url}/gastown_${version}_linux_arm64.tar.gz"
                sha256 "${linux_arm64_sha}"
              else
                url "${base_url}/gastown_${version}_linux_amd64.tar.gz"
                sha256 "${linux_amd64_sha}"
              end
            end

            depends_on "beads"
            depends_on "dolt"
            depends_on "git"
            depends_on "tmux"

            def install
              bin.install "gt"
            end

            test do
              assert_match version.to_s, shell_output("#{bin}/gt version")
            end
          end
          FORMULA
          sed -i 's/^          //' /tmp/gastown.rb

          cd /tmp
          git clone "https://x-access-token:${HOMEBREW_TAP_TOKEN}@github.com/gastownhall/homebrew-gastown.git"
          mkdir -p homebrew-gastown/Formula
          cp gastown.rb homebrew-gastown/Formula/gastown.rb
          cd homebrew-gastown
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/gastown.rb
          git commit -m "gastown ${version}" || echo "No changes to commit"
          git push

      - name: Skip Homebrew formula update
        if: ${{ env.HAS_HOMEBREW_APP != 'true' && env.HAS_HOMEBREW_PAT != 'true' }}
        run: echo "No Homebrew tap credential configured; skipping tap update."

  publish-npm:
    runs-on: ubuntu-latest
    needs: goreleaser
    if: ${{ github.repository == 'gastownhall/gastown' && startsWith(github.ref, 'refs/tags/v') }}
    # npm publish is best-effort — don't fail the release if npm is down or
    # the @gastown org isn't set up yet. GoReleaser + Homebrew are the primary
    # distribution channels.
    continue-on-error: true
    permissions:
      contents: read
      id-token: write  # OIDC token for npm trusted publishing (no NPM_TOKEN needed)
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'

      - name: Update npm for provenance support
        run: npm install -g npm@latest

      - name: Publish to npm
        run: |
          cd npm-package
          npm publish --access public --provenance
